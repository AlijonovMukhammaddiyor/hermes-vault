id: AG201
title: AI Agent Engineering
subject_domain: ai-engineering
credits: 4
north_star: >
  Design, build, evaluate, and deploy production-grade AI agent systems — from a single ReAct loop
  to multi-agent orchestrations — with the architectural judgment of a staff-level engineer.
description: >
  From scratch to frontier: a 24-week, two-semester course that builds every layer of AI agent
  engineering. Starts with Python and LLM fundamentals (transformers, attention, prompting), then
  constructs the full agent stack layer by layer — structured output, tool use, agent loops,
  context engineering, RAG, multi-agent orchestration, code-execution agents, and production
  deployment. Evaluation and observability are threaded throughout, not deferred. Grounded in
  primary research (Anthropic, Cognition, Manus, Berkeley LLM Agents MOOC) and anchored by
  Jurafsky & Martin SLP3 plus Chip Huyen's AI Engineering. Graduates ship a portfolio-grade
  agent system and can defend architecture choices with quantitative reasoning about cost,
  latency, and reliability.

audience:
  good_fit:
    - "Comfortable with Python basics (functions, dicts, list comprehensions) and eager to go deep — this course builds the agent stack from the metal up. You want to understand WHY, not just wire frameworks."
    - "You have 3h/day to commit and are willing to implement things from scratch before reaching for abstractions. The bar is staff-level engineering thinking."
  not_a_fit:
    - "Already shipping production agent systems at scale and reading COLM papers weekly — you may want a more targeted deep-dive (e.g., the Berkeley Advanced LLM Agents MOOC directly)."
    - "Looking for a framework-wiring tutorial (LangChain/CrewAI quickstart). This course builds from first principles — you'll use frameworks later, but only after you can rebuild them."
    - "No Python experience at all — start with DeepLearning.AI's 'AI Python for Beginners' first, then come back."

prerequisites: []
enduring_understandings:
  - "The LLM is the reasoning core; tools are its arms; structured output is its reliable communication protocol. Every agent architecture is a composition of these three primitives."
  - "Evaluation is not a final step — it is the engine of improvement. The #1 differentiator between competent and excellent agent engineers is disciplined eval and error analysis."
  - "Context engineering — KV-cache economics, compaction, externalized memory, preserving failures — is where reliability is won or lost, not prompt polishing."
  - "Architecture follows task structure. Multi-agent wins for parallelizable, independent subtasks. Single-agent or deterministic pipelines win for tightly coupled work. Know when not to add agentic complexity."
  - "The Bitter Lesson applies at the application layer: scaffolding that models can internalize will be obsolete. Build harnesses that survive model upgrades."
  - "Compound errors in agentic systems mean minor issues can derail entire runs. Observability, checkpointing, and graceful error recovery are not optional — they are the system."
  - "The goal is not to wire a framework — it is to understand the architecture deeply enough to rebuild it when the framework changes."

primary_text:
  type: textbook
  title: "Speech and Language Processing (3rd ed. draft)"
  author: "Dan Jurafsky & James H. Martin"
  url: "https://web.stanford.edu/~jurafsky/slp3/"
  locator: "ch. 9-12 (transformers, LLMs, prompting, fine-tuning, RLHF, RAG, agents)"
  why: "The canonical, free, continuously updated NLP/LLM reference — chapters 9-12 cover the full LLM stack that agents are built on."
  tier: core
  cost: free

resources:
  - type: textbook
    title: "AI Engineering"
    author: "Chip Huyen"
    url: "https://www.oreilly.com/library/view/ai-engineering/9781098166309/"
    locator: "whole (evals ch. 5-7, RAG ch. 8-9, agents ch. 10-12, deployment ch. 13-15)"
    why: "The practitioner's textbook for building LLM applications end-to-end — bridges theory to production."
    tier: core
    cost: paid
  - type: textbook
    title: "Hands-On Large Language Models"
    author: "Jay Alammar & Maarten Grootendorst"
    url: "https://www.oreilly.com/library/view/hands-on-large-language/9781098150952/"
    locator: "whole"
    why: "Visual, code-first companion — builds transformer/attention intuition through implementation."
    tier: supplementary
    cost: paid
  - type: course
    title: "UC Berkeley CS294/194-196: Large Language Model Agents"
    author: "Dawn Song, Xinyun Chen"
    url: "https://llmagents-learning.org/"
    locator: "Lectures 1-14 (full MOOC)"
    why: "The definitive academic agent course — guest lectures from the researchers who defined the field."
    tier: core
    cost: free
  - type: course
    title: "Stanford CS336: Language Modeling from Scratch"
    author: "Percy Liang, et al."
    url: "https://cs336.stanford.edu/"
    locator: "Lectures 1-10"
    why: "Build an LLM end-to-end — deepest possible foundation for understanding what agents run on."
    tier: supplementary
    cost: free

professor_profile:
  persona: >
    A senior agent engineer who has built and shipped production agent systems. Direct, no fluff,
    allergic to framework-worship. Speaks in architecture diagrams and eval metrics, not hype.
    Pushes the learner to understand WHY before reaching for WHAT — reads source code, studies
    failure modes, measures everything. Deeply respects the craft of building reliable systems
    on unreliable foundations.
  teaching_stance: >
    Concept-first, build-second, evaluate-third. Every new idea starts with the mental model
    (diagram + primary source), then a minimal implementation from scratch (no framework on first
    pass), then an eval that proves it works. Faded scaffolding: heavily guided on foundations,
    increasingly independent as the learner builds agency. Wrong answers get targeted micro-lessons
    on the exact misconception, then re-testing. Every unit connects back to a real production
    system the learner is studying (Anthropic, Manus, Cognition, Fin).
  common_misconceptions:
    - "Agents are just LLMs with tools wired in — the real complexity is context management, error recovery, and eval, not the wiring."
    - "Multi-agent is always better — in reality, single-agent beats multi-agent for tightly coupled work, and multi-agent's cost (15× tokens) must be justified by the task structure."
    - "You need LangChain/CrewAI to build agents — the best engineers build directly against APIs first, add framework abstraction only when it earns its place."
    - "Prompt engineering is tweaking wording — it's programming in natural language: structured output schemas, few-shot selection, system-message architecture."
    - "Eval can wait until the end — eval is the engine of improvement and must be built alongside the agent from day one."
    - "KV-cache is an infra detail — KV-cache hit rate is the single most important metric for production agent cost and latency."

  assessment_philosophy: >
    Excellent means the learner can (a) build the thing from scratch without a framework, (b) explain
    every architectural decision with quantitative reasoning (cost, latency, reliability), (c) design
    and run evals that catch real failure modes, and (d) read and critique a production agent system's
    architecture. Rubric grading: every artifact is scored against specific criteria with written
    reasoning before each verdict. Above Bloom "apply," a self-explanation is required. Mediocre
    work that "kinda works" gets honest feedback, not a passing grade — the bar is what a staff
    engineer would ship.

mastery_model:
  excellence_bar: >
    A staff-level agent engineer can: (1) decompose an ambiguous problem into the right control-flow
    shape (prompt chaining, routing, parallelization, orchestrator-workers, evaluator-optimizer);
    (2) build the evaluation and observability infrastructure that makes iteration possible;
    (3) reason quantitatively about cost, latency, and reliability trade-offs; (4) design agent
    harnesses that survive model upgrades; (5) know when NOT to add agentic complexity; (6) read
    and critique a frontier agent architecture from primary sources; (7) ship a production agent
    system that others use.
  expert_practices:
    - "Build fast, analyze traces, run small evals (10-20 samples), do error analysis to isolate the weakest component, improve that component, repeat. This loop IS the work."
    - "End-state evaluation for stateful agents, not turn-by-turn. LLM-as-judge for scalable scoring plus mandatory human review to catch edge cases."
    - "Track total runtime per tool call, total tool calls, total token consumption, tool error rates, and trajectory quality — not just top-line accuracy."
    - "Keep architecture simple. Make reasoning visible. Ensure reliable, well-scoped tool interactions. Use checkpointing, retry logic, and incremental deployments."
    - "Design harnesses expecting to re-architect repeatedly as models improve. The willingness to strip away scaffolding when models internalize it is the staff-level muscle."
  frontier: >
    The central live debate (2025-2026): single-agent (Cognition) vs. multi-agent (Anthropic).
    Anthropic's multi-agent system outperforms single-agent by 90.2% on internal evals but uses
    15× more tokens. Code-execution agents (CodeAct) increasingly outperform JSON tool-calling.
    The field is moving from SWE-bench Verified (now saturated) to harder benchmarks (SWE-bench Pro,
    Terminal-Bench, SWE-bench Multilingual). Multi-turn RL for agentic behavior (AgentGym-RL,
    RAGEN) is the next frontier — training agents, not just prompting them. Standardization is
    emerging (MCP for tool integration, AGENTS.md for project context).
  staying_current:
    - type: reference
      title: "Latent Space (swyx & Alessio)"
      url: "https://latentspacepod.com"
      why: "The AI-engineering publication of record — newsletter, podcast, weekly LLM Paper Club on Discord."
    - type: reference
      title: "Simon Willison's Weblog"
      url: "https://simonwillison.net"
      why: "Near-daily practical AI engineering — the 'lethal trifecta' framing for agent security."
    - type: reference
      title: "Ahead of AI (Sebastian Raschka)"
      url: "https://magazine.sebastianraschka.com"
      why: "Deep technical dives on LLM research — especially training and fine-tuning advances."
    - type: reference
      title: "Interconnects (Nathan Lambert)"
      url: "https://interconnects.ai"
      why: "RLHF and post-training deep analysis — the training side of agent capability."
    - type: reference
      title: "LLM Agents Discord (Berkeley MOOC community)"
      url: "https://discord.gg/llm-agents"
      why: "Peer learning, paper discussion, project sharing around the Berkeley course."
    - type: reference
      title: "COLM (Conference on Language Modeling)"
      url: "https://colmweb.org"
      why: "The LLM-focused academic venue — where the best agent architecture papers are published."
    - type: reference
      title: "Anthropic Engineering Blog"
      url: "https://anthropic.com/engineering"
      why: "Primary source for production agent architecture, eval methodology, and tool design."
  signature_work: >
    A portfolio-grade agent system shipped and used by real people: either (a) a code-execution agent
    that solves real software engineering tasks in a sandbox, (b) a research agent that performs
    multi-source deep research with citations, or (c) a domain-specific multi-agent system that
    orchestrates parallel workers. The system must have full observability, a documented eval harness,
    and an architecture decision record explaining each choice quantitatively. This is what earns a
    seat with the best — not a certificate, but demonstrable capability.
  deliberate_practice: >
    Each unit: concept lesson (diagram + primary source) → minimal from-scratch implementation →
    eval (10-20 sample test set) → error analysis → improve → re-eval. Weekly: read one agent paper
    and write a one-paragraph critique. By Semester 2: study one production agent system's source
    code or architecture deep-dive each month (OpenHands, SWE-agent, Aider). Ship one real project
    by course end. The rhythm is build → measure → improve → reflect, every week.

grading_scale: { A: 4.0, B: 3.0, C: 2.0, F: 0.0 }
grade_weights: { hw: 0.40, quiz: 0.15, exam: 0.15, midterm: 0.10, finals: 0.20 }

rubrics:
  - id: agent-build
    shape: analytic
    criteria:
      - name: "Correctness"
        target_descriptor: "The agent produces correct outputs for the eval set (≥80% pass rate on held-out test cases)."
      - name: "Architecture"
        target_descriptor: "The design follows the unit's pattern (e.g. ReAct loop, orchestrator-worker) with clean separation of reasoning, tool execution, and response generation."
      - name: "Error recovery"
        target_descriptor: "The agent handles tool failures gracefully (retry, fallback, escalate) — it does not silently fail or hallucinate tool results."
      - name: "Eval rigor"
        target_descriptor: "An eval harness with ≥10 test cases, end-state assertions, and a written error analysis identifying the weakest component."
      - name: "Self-explanation"
        target_descriptor: "Can explain every architectural choice with quantitative or research-backed reasoning. For Bloom ≥ apply: required to pass."
  - id: concept-mastery
    shape: single_point
    criteria:
      - name: "Understanding"
        target_descriptor: "Can explain the concept from first principles with correct mental models, cite the primary source, and connect it to a real production system."

assessments:
  # Core proof gates (major summatives)
  - id: a.u6.build
    outcome_id: u6.build-agent
    type: summative
    modality: open_problem
    bloom_target: create
    rubric_id: agent-build
    proof_gate: "Working ReAct agent from scratch (~400 lines, no framework) with ≥3 real tools, ≥10 eval cases, error analysis, and self-explanation of the loop architecture."
    scaffold_stage: independent
  - id: a.u9.design
    outcome_id: u9.design-multiagent
    type: summative
    modality: open_problem
    bloom_target: create
    rubric_id: agent-build
    proof_gate: "Working multi-agent system with ≥2 workers, artifact-passing (file system or message bus), ≥10 eval cases, and a written architecture decision record comparing single-agent vs multi-agent with quantitative reasoning."
    scaffold_stage: independent
  - id: a.u12.capstone
    outcome_id: u12.ship
    type: summative
    modality: project
    bloom_target: create
    rubric_id: agent-build
    proof_gate: "Portfolio-grade agent system: shipped, observable, eval-harnessed, with an architecture decision record. Must demonstrate at least 3 of: code execution, RAG, multi-agent, context engineering, computer use."
    scaffold_stage: independent

  # Unit-level summatives
  - id: a.u1.python-tools
    outcome_id: u1.python-tools
    type: summative
    modality: worked-completion
    bloom_target: apply
    rubric_id: concept-mastery
    proof_gate: "Async Python script that calls 3+ APIs, handles errors, logs execution, and writes structured output. Must run without errors and pass 5 test cases."
    scaffold_stage: worked_example
  - id: a.u2.transformer
    outcome_id: u2.transformer
    type: summative
    modality: open_problem
    bloom_target: apply
    rubric_id: concept-mastery
    proof_gate: "Working minimal transformer implementation (attention + FFN + layer norm) with a written explanation of attention computation, tokenization, and inference forward pass from first principles."
    scaffold_stage: completion
  - id: a.u3.prompt
    outcome_id: u3.prompt
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: concept-mastery
    proof_gate: "5 escalating prompts for the same task, each scored against a 10-example test set, with written explanation of why each technique improved which failure mode."
    scaffold_stage: completion
  - id: a.u4.structured
    outcome_id: u4.structured
    type: summative
    modality: open_problem
    bloom_target: apply
    rubric_id: concept-mastery
    proof_gate: "Smart form filler that extracts structured JSON from natural language, with schema validation, error handling for missing/ambiguous fields, and ≥80% accuracy on 10 test inputs."
    scaffold_stage: completion
  - id: a.u5.tools
    outcome_id: u5.tools
    type: summative
    modality: open_problem
    bloom_target: apply
    rubric_id: agent-build
    proof_gate: "Multi-tool agent (3+ tools, raw API calls, no framework) with retry/fallback/escalation error recovery, tested on 10 edge-case queries with ≥80% correct tool selection."
    scaffold_stage: completion
  - id: a.u7.context
    outcome_id: u7.context
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: agent-build
    proof_gate: "Instrumented agent with context-efficiency metrics (KV-cache hit rate, token usage), at least 2 context-engineering techniques implemented, and a measured improvement report."
    scaffold_stage: independent
  - id: a.u8.rag
    outcome_id: u8.rag
    type: summative
    modality: open_problem
    bloom_target: apply
    rubric_id: agent-build
    proof_gate: "RAG pipeline with embedding, vector store, retrieval, and citation. Integrated as agent tool. ≥80% answer quality on 15 queries with precision@k and recall@k reported."
    scaffold_stage: independent
  - id: a.u10.code-agent
    outcome_id: u10.code-agent
    type: summative
    modality: open_problem
    bloom_target: analyze
    rubric_id: agent-build
    proof_gate: "Code-execution agent in sandbox that writes, runs, and iterates on code with error recovery. Plus a 1-page architectural analysis of OpenHands or SWE-agent with specific code-level observations."
    scaffold_stage: independent
  - id: a.u11.eval
    outcome_id: u11.eval
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: agent-build
    proof_gate: "Complete eval harness (≥20 held-out cases, LLM-as-judge, error analysis), full-session observability traces, and a measurable before/after improvement from diagnosis to fix."
    scaffold_stage: independent

units:
  # ═══════════════ SEMESTER 1: Foundations → First Agent ═══════════════
  - id: u1-python
    title: Python for AI Engineering
    order_index: 1
    semester: 1
    est_weeks: 2
    foundational: true
    summary: "Build the Python toolkit agents need: API calls, JSON handling, async I/O, data structures for LLM pipelines, environment management, and debugging."
    resources:
      - type: course
        title: "AI Python for Beginners (DeepLearning.AI)"
        url: "https://www.deeplearning.ai/short-courses/ai-python-for-beginners/"
        locator: "all 4 lessons"
        why: "Fastest path to the specific Python (data handling, APIs, async) that agents need — agent-oriented from day one."
        tier: core
        cost: free
      - type: textbook
        title: "Python Crash Course (3rd ed.)"
        author: "Eric Matthes"
        locator: "ch. 1-11, 15-17 (APIs), 18-20 (Django intro — skip, just read API patterns)"
        why: "Solid Python foundations if the learner needs more depth than the DLAI course."
        tier: supplementary
        cost: paid
    sessions:
      - week: 1
        focus: "Python environment, data structures, functions, type hints, list/dict comprehensions — the patterns agents use to process LLM output."
        readings:
          - type: course
            title: "AI Python for Beginners (DeepLearning.AI)"
            locator: "Lessons 1-2"
            cost: free
        deliverable: "A Python script that calls a REST API (e.g., OpenWeatherMap), parses JSON, handles errors, and prints a formatted summary."
      - week: 2
        focus: "Async I/O, HTTP clients (httpx/aiohttp), error handling patterns, logging, environment management (venv/uv), debugging with pdb."
        readings:
          - type: course
            title: "AI Python for Beginners (DeepLearning.AI)"
            locator: "Lessons 3-4"
            cost: free
        deliverable: "An async script that makes 3+ concurrent API calls, handles timeouts/retries, logs each step, and writes structured results to a JSON file."
    outcomes:
      - id: u1.python-tools
        statement: "Write async Python scripts that call REST APIs, parse structured JSON responses, handle errors (timeout/retry/fallback), and log execution — all without a framework."
        bloom_level: apply
        depends_on: []
        proof: a.u1.python-tools
        spaced_items: [pat.async, pat.error-handling]
        mastery_threshold: 0.8

  - id: u2-llm-fundamentals
    title: LLM Fundamentals — Transformers, Attention, Tokenization
    order_index: 2
    semester: 1
    est_weeks: 3
    foundational: true
    summary: "Build deep understanding of what agents run on: the transformer architecture, attention mechanism, tokenization, pretraining, and inference. Implement a tiny transformer from scratch."
    resources:
      - type: video
        title: "Neural Networks: Zero to Hero (Andrej Karpathy)"
        url: "https://www.youtube.com/playlist?list=PLAqhIrjkxrVzNBzVO2E4PcbWQyZJ4hR9h"
        locator: "Lectures 1-7 (micrograd → GPT from scratch)"
        why: "Builds GPT from scratch — unmatched intuition for what happens inside the model agents call."
        tier: core
        cost: free
      - type: video
        title: "3Blue1Brown: Transformers & Attention"
        url: "https://www.youtube.com/watch?v=eMlx5fFNoYc"
        locator: "full series"
        why: "Visual intuition for attention, query/key/value, and multi-head attention — the 'aha' moment."
        tier: core
        cost: free
      - type: textbook
        title: "Speech and Language Processing (3rd ed.)"
        author: "Jurafsky & Martin"
        url: "https://web.stanford.edu/~jurafsky/slp3/"
        locator: "ch. 9 (transformers), ch. 10 (pretraining & fine-tuning), ch. 11 (prompting & in-context learning)"
        why: "The authoritative technical reference — read alongside Karpathy for theory + implementation."
        tier: core
        cost: free
      - type: textbook
        title: "Hands-On Large Language Models"
        author: "Alammar & Grootendorst"
        url: "https://www.oreilly.com/library/view/hands-on-large-language/9781098150952/"
        locator: "ch. 1-4 (tokenization → attention → transformers)"
        why: "Code-first, visual companion — implement as you read."
        tier: supplementary
        cost: paid
    sessions:
      - week: 3
        focus: "Tokenization — BPE, token vocabulary, special tokens, context windows. What the model actually 'sees' vs what you send."
        readings:
          - type: video
            title: "Karpathy: Let's build GPT from scratch"
            url: "https://www.youtube.com/watch?v=kCc8FmEb1nY"
            locator: "first 60 min (tokenization + bigram baseline)"
            cost: free
          - type: textbook
            title: "SLP3"
            locator: "ch. 2 sec. 2.5 (tokenization)"
            cost: free
        deliverable: "Implement a BPE tokenizer from scratch on a small corpus. Explain: why subword tokenization? What happens to out-of-vocabulary words?"
      - week: 4
        focus: "Attention — query, key, value, scaled dot-product, multi-head attention, causal masking. The core mechanism that makes transformers work."
        readings:
          - type: video
            title: "3Blue1Brown: Attention in transformers, visually explained"
            url: "https://www.youtube.com/watch?v=eMlx5fFNoYc"
            locator: "full video (26 min)"
            cost: free
          - type: textbook
            title: "SLP3"
            locator: "ch. 9 sec. 9.1-9.4 (self-attention, multi-head, transformer blocks)"
            cost: free
        deliverable: "Implement multi-head self-attention from scratch (NumPy/PyTorch) on a small sequence. Trace Q, K, V through the computation and explain at the tensor level."
      - week: 5
        focus: "Full transformer — encoder-decoder vs decoder-only, layer norm, residual connections, feed-forward, positional encoding. What happens during inference vs training."
        readings:
          - type: video
            title: "Karpathy: Let's build GPT from scratch"
            url: "https://www.youtube.com/watch?v=kCc8FmEb1nY"
            locator: "remainder (60 min → end, GPT implementation)"
            cost: free
          - type: textbook
            title: "SLP3"
            locator: "ch. 9 sec. 9.5-9.8 (full architecture), ch. 10 (pretraining)"
            cost: free
        deliverable: "Complete a working tiny GPT that can generate text. Explain: what happens step-by-step during a single forward pass of inference. Why decoder-only for modern LLMs?"
    outcomes:
      - id: u2.transformer
        statement: "Implement a minimal transformer (multi-head attention + feed-forward + layer norm) and explain attention computation, tokenization, and the inference forward pass from first principles."
        bloom_level: apply
        depends_on: [u1.python-tools]
        proof: a.u2.transformer
        spaced_items: [con.attention, con.transformer, con.tokenization]
        mastery_threshold: 0.8

  - id: u3-prompt-engineering
    title: Prompt Engineering — Programming in Natural Language
    order_index: 3
    semester: 1
    est_weeks: 1
    foundational: true
    summary: "Master prompt engineering as structured programming: system messages, few-shot selection, chain-of-thought, output format constraints, and prompt architecture patterns."
    resources:
      - type: docs
        title: "Anthropic Prompt Engineering Guide"
        url: "https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview"
        locator: "full guide (overview → be clear and direct → use examples → chain of thought → system prompts)"
        why: "Vendor-authoritative, research-backed, continuously updated — the primary reference."
        tier: core
        cost: free
      - type: course
        title: "ChatGPT Prompt Engineering for Developers (DeepLearning.AI)"
        url: "https://www.deeplearning.ai/short-courses/chatgpt-prompt-engineering-for-developers/"
        locator: "all lessons"
        why: "Hands-on with the patterns: iterative refinement, summarizing, inferring, transforming, expanding."
        tier: core
        cost: free
      - type: reference
        title: "Prompting Guide (DAIR.AI)"
        url: "https://www.promptingguide.ai/"
        locator: "techniques section (zero-shot, few-shot, CoT, self-consistency, ReAct)"
        why: "Comprehensive catalog of prompting techniques with research paper citations."
        tier: supplementary
        cost: free
    sessions:
      - week: 6
        focus: "System messages, few-shot examples, CoT, output format specification. Prompt as programming — explicit over implicit, constraints over hopes."
        readings:
          - type: docs
            title: "Anthropic Prompt Engineering Guide"
            locator: "full"
            cost: free
          - type: course
            title: "ChatGPT Prompt Engineering (DLAI)"
            locator: "lessons 1-6"
            cost: free
        deliverable: "Write 5 prompts for the same task (e.g., 'classify customer support tickets by urgency and category') with escalating quality: naive → system message → few-shot → CoT → structured JSON output. Score each on accuracy against a 10-example test set. Explain why each improvement moved the needle."
    outcomes:
      - id: u3.prompt
        statement: "Design, test, and iteratively improve prompts using system messages, few-shot examples, chain-of-thought, and structured output specifications. Score and explain which technique improves which failure mode."
        bloom_level: evaluate
        depends_on: [u2.transformer]
        proof: a.u3.prompt
        spaced_items: [pat.system-msg, pat.few-shot, pat.cot]
        mastery_threshold: 0.8

  - id: u4-structured-output
    title: Structured Output & Function Calling
    order_index: 4
    semester: 1
    est_weeks: 1
    foundational: true
    summary: "Move from free-text parsing to reliable machine-readable contracts: JSON mode, function/tool calling schemas, response_format, and the API contract pattern."
    resources:
      - type: docs
        title: "OpenAI Structured Outputs / Function Calling"
        url: "https://platform.openai.com/docs/guides/structured-outputs"
        locator: "full guide (structured outputs + function calling)"
        why: "The canonical API spec — understand the contract before abstracting it."
        tier: core
        cost: free
      - type: docs
