  # ═══════════════ U10: Safety, Guardrails & Reliability ═══════════════
  - id: u10-safety
    title: Safety, Guardrails & Reliability — Capping the Blast Radius
    order_index: 10
    semester: 2
    est_weeks: 1
    foundational: false
    summary: "Design the safety architecture that keeps agents from causing harm. Input guardrails (prompt injection, PII), output guardrails (content safety, hallucination), escalation-to-human patterns, least-privilege sandboxing, and the OWASP LLM Top 10 as your security checklist."
    resources:
      - type: reference
        title: "OWASP Top 10 for LLM Applications"
        url: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
        locator: "full list with descriptions"
        why: "The industry-standard threat model — every agent engineer should know these 10 risks."
        tier: core
        cost: free
      - type: reference
        title: "Simon Willison: Prompt Injection and the Lethal Trifecta"
        url: "https://simonwillison.net/series/prompt-injection/"
        locator: "series of posts"
        why: "The clearest explainer of prompt injection — why it's the hardest security problem in agent systems."
        tier: core
        cost: free
      - type: course
        title: "Berkeley Advanced LLM Agents MOOC — Safety Lectures"
        url: "https://rdi.berkeley.edu/advanced-agentic-ai/"
        locator: "safety/guardrails lectures"
        why: "Rigorous academic treatment of agent safety, alignment, and guardrails."
        tier: core
        cost: free
      - type: reference
        title: "Fin by Intercom: Safety Architecture"
        url: "https://www.intercom.com/blog/announcing-fin/"
        locator: "escalation + safety sections"
        why: "Production case study: escalation-to-human on low confidence, content safety filters, 99.97% uptime."
        tier: supplementary
        cost: free
    sessions:
      - week: 17
        focus: "Input guardrails — prompt injection (direct and indirect), PII detection, command injection. Output guardrails — content safety, hallucination detection, malformed output. Escalation-to-human: when to hand off, confidence thresholds, the Fin pattern. Blast-radius engineering — least-privilege sandboxing, tool-scope limitation, read-only subagents. Map everything to OWASP LLM Top 10."
        readings:
          - type: reference
            title: "OWASP LLM Top 10"
            locator: "full"
            cost: free
          - type: reference
            title: "Willison: Prompt Injection"
            locator: "series"
            cost: free
          - type: course
            title: "Berkeley MOOC Safety Lectures"
            locator: "full"
            cost: free
        deliverable: "Design a safety and guardrail architecture for an agent that handles user data. Address: input guardrails, output guardrails, escalation-to-human thresholds, and blast-radius engineering. Map to OWASP Top 10. For each guardrail, specify what happens on violation. Use your coding agent to research implementations; you design the architecture."
    outcomes:
      - id: u10.safety
        statement: "Design a safety and guardrail architecture for a production agent: input/output guardrails, escalation-to-human thresholds, blast-radius engineering. Map to OWASP LLM Top 10 and justify each decision."
        bloom_level: evaluate
        depends_on: [u9.code-agent]
        proof: a.u10.safety
        spaced_items: [con.prompt-injection, con.owasp-top10, pat.escalation, con.blast-radius]
        mastery_threshold: 0.8

  # ═══════════════ U11: Production Deployment & Cost Engineering ═══════════════
  - id: u11-production
    title: Production Deployment & Cost Engineering — Shipping Reliable Agents
    order_index: 11
    semester: 2
    est_weeks: 1
    foundational: false
    summary: "Production deployment patterns: checkpointing, retry logic, rainbow deployments, cost monitoring, multi-model resilience. Plus: the post-training/RL debate — when does fine-tuning beat context engineering for reliability? Argue both sides using Manus's deliberate no-fine-tuning position."
    resources:
      - type: textbook
        title: "AI Engineering (Huyen)"
        locator: "ch. 9–10 (architecture, deployment, monitoring)"
        why: "The production deployment chapters — what it takes to ship and maintain agent systems."
        tier: core
        cost: paid
      - type: reference
        title: "Anthropic: Effective Harnesses for Long-Running Agents"
        url: "https://www.anthropic.com/engineering/effective-harnesses"
        locator: "full essay"
        why: "Checkpointing, progress artifacts, initialization — the patterns for long-horizon reliability."
        tier: core
        cost: free
      - type: reference
        title: "Manus: Context Engineering (production economics)"
        author: "Yichao 'Peak' Ji"
        url: "https://manus.im/blog/context-engineering"
        locator: "KV-cache economics sections (re-read)"
        why: "The economics of running agents at scale — cost tracking, optimization, why Manus refused to fine-tune."
        tier: core
        cost: free
      - type: reference
        title: "\"The Landscape of Agentic Reinforcement Learning for LLMs: A Survey\""
        author: "Zhang et al."
        url: "https://arxiv.org/abs/2509.02547"
        locator: "abstract + key results"
        why: "The SOTA map of agentic RL — when training agents beats prompting them."
        tier: supplementary
        cost: free
    sessions:
      - week: 18
        focus: "Production patterns — checkpointing (resume from mid-task failure), retry with exponential backoff, rainbow/incremental deployments, cost monitoring (token budgets, model-tier selection), multi-model resilience. Then the debate: when does post-training/RL beat context engineering for reliability? Manus deliberately refused to fine-tune — models kept improving, fine-tuned versions went obsolete. But agentic RL (AgentGym-RL, RAGEN) shows promise. Argue both sides."
        readings:
          - type: textbook
            title: "AI Engineering (Huyen)"
            locator: "ch. 9–10"
            cost: paid
          - type: reference
            title: "Anthropic: Effective Harnesses"
            locator: "full"
            cost: free
          - type: reference
            title: "Zhang et al.: Agentic RL Survey"
            locator: "abstract + key results"
            cost: free
        deliverable: "Analyze a production agent deployment (Fin or Anthropic Research). Cover: checkpointing/retry, cost monitoring, deployment pattern, and reliability architecture. Then argue: when does post-training/RL beat context engineering for reliability? Use Manus's no-fine-tuning position as one reference. Use your coding agent to gather data; you produce the analysis."
    outcomes:
      - id: u11.deploy
        statement: "Analyze production deployment patterns (checkpointing, retry, cost monitoring, rainbow deploys) and argue both sides of the post-training/RL vs context-engineering debate for agent reliability — using production case studies as evidence."
        bloom_level: evaluate
        depends_on: [u10.safety]
        proof: a.u11.deploy
        spaced_items: [pat.checkpointing, pat.rainbow-deploy, con.fine-tuning-vs-context]
        mastery_threshold: 0.8

  # ═══════════════ U12: Observability & Trajectory Evals ═══════════════
  - id: u12-observability
    title: Observability & Trajectory Evals — Diagnosing Failure at Scale
    order_index: 12
    semester: 2
    est_weeks: 2
    foundational: false
    summary: "The late-stage eval deep-dive. Now that you've studied every layer of the agent stack, learn to instrument it for observability and diagnose failures from traces. Full-session tracing with Langfuse, trajectory-quality metrics, LLM-as-judge aligned to humans, and the measured before/after improvement report."
    resources:
      - type: reference
        title: "Langfuse Documentation"
        url: "https://langfuse.com/docs"
        locator: "tracing + evaluation docs"
        why: "Leading open-source, MIT-licensed. Full-session trace capture for multi-step agent chains."
        tier: core
        cost: free
      - type: reference
        title: "Hamel Husain: A Field Guide to Rapidly Improving AI Products"
        url: "https://hamel.dev/blog/posts/field-guide/"
        locator: "full post (re-read with fresh eyes)"
        why: "The eval-driven development loop — now with hands-on tracing experience."
        tier: core
        cost: free
      - type: reference
        title: "Shreya Shankar et al.: Who Validates the Validators?"
        url: "https://arxiv.org/abs/2310.09335"
        locator: "full paper"
        why: "LLM-as-judge validation — when the judge is wrong, and how to align it to human judgment."
        tier: core
        cost: free
      - type: course
        title: "Hugging Face Agents Course — Observability & Eval Unit"
        url: "https://huggingface.co/learn/agents-course/unit4"
        locator: "full unit"
        why: "Hands-on with Langfuse/OpenTelemetry for agent tracing and evaluation."
        tier: supplementary
        cost: free
      - type: reference
        title: "τ-bench: A Benchmark for Tool-Agent-User Interaction"
        author: "Yao et al. (ICLR 2025)"
        url: "https://arxiv.org/abs/2406.12045"
        locator: "abstract + benchmark design"
        why: "The canonical tool-use agent benchmark — what a real agent eval looks like."
        tier: supplementary
        cost: free
    sessions:
      - week: 19
        focus: "Observability infrastructure — Langfuse tracing, OpenTelemetry, full-session trace capture. Key metrics: total runtime, tool calls, token consumption, tool error rates, KV-cache hit rate, trajectory quality. Dashboard design — what to put on screen, alert thresholds."
        readings:
          - type: reference
            title: "Langfuse Docs"
            locator: "tracing quickstart + eval features"
            cost: free
          - type: course
            title: "Hugging Face Agents Course — Unit 4"
            locator: "full"
            cost: free
        deliverable: "Design an observability plan for an agent system. Specify: tracing tool, key metrics, alert thresholds, dashboard layout. Wire your coding agent to instrument the system. Capture traces from 5 tasks."
      - week: 20
        focus: "Trajectory evals — LLM-as-judge aligned to human judgment, Who Validates the Validators. Error analysis from traces: identify the single weakest component, trace failures to root causes. Before/after improvement: diagnose → fix → measure. The eval-driven development loop in practice."
        readings:
          - type: reference
            title: "Husain: Field Guide (re-read)"
            locator: "full"
            cost: free
          - type: paper
            title: "Who Validates the Validators?"
            locator: "full"
            cost: free
        deliverable: "Run ≥10 tasks through your instrumented agent, capture full traces. From the traces: identify the single weakest component, propose a fix, implement it (via coding agent), and produce a before/after report with metrics. This is a measured improvement report — numbers, not opinions."
    outcomes:
      - id: u12.observe
        statement: "Instrument an agent with full-session observability (Langfuse), diagnose the single weakest component from traces, implement a fix, and produce a measured before/after improvement report with specific metrics."
        bloom_level: evaluate
        depends_on: [u11.deploy]
        proof: a.u12.observe
        spaced_items: [pat.observability, con.trajectory-eval, pat.error-analysis-loop]
        mastery_threshold: 0.8

