  # ═══════════════ U3: The Augmented LLM Loop ═══════════════
  - id: u3-agent-loops
    title: The Augmented LLM Loop — ReAct, Planning & Reflection
    order_index: 3
    semester: 1
    est_weeks: 2
    foundational: false
    summary: "Understand the core agent patterns: ReAct (Reason+Act), Plan-and-Execute, and Reflection. Study the primary papers and production implementations. The goal is architectural analysis — critique what exists, identify failure modes, and reason about when each pattern is appropriate."
    resources:
      - type: paper
        title: "ReAct: Synergizing Reasoning and Acting in Language Models"
        author: "Yao et al. (ICLR 2023)"
        url: "https://arxiv.org/abs/2210.03629"
        locator: "full paper"
        why: "The foundational agent-loop paper — read the primary source that defined the pattern."
        tier: core
        cost: free
      - type: paper
        title: "Reflexion: Language Agents with Verbal Reinforcement Learning"
        author: "Shinn et al. (NeurIPS 2023)"
        url: "https://arxiv.org/abs/2303.11366"
        locator: "full paper"
        why: "The reflection pattern: self-critique + improvement loop — the second major agent pattern."
        tier: core
        cost: free
      - type: reference
        title: "Lilian Weng: LLM Powered Autonomous Agents"
        url: "https://lilianweng.github.io/posts/2023-06-23-agent/"
        locator: "full post"
        why: "The canonical survey: planning, memory, tool-use — the complete agent architecture picture."
        tier: core
        cost: free
      - type: reference
        title: "SWE-agent: Agent-Computer Interfaces"
        author: "Yang, Jimenez et al. (NeurIPS 2024)"
        url: "https://arxiv.org/abs/2405.15793"
        locator: "sec. 1–3 (ACI design)"
        why: "The ACI insight: agents need purpose-built interfaces, not human UIs. A core architectural principle."
        tier: core
        cost: free
      - type: reference
        title: "Anthropic: Building Effective Agents"
        url: "https://www.anthropic.com/engineering/building-effective-agents"
        locator: "full essay"
        why: "Workflows vs agents — the most important architectural distinction. When simplicity wins."
        tier: core
        cost: free
    sessions:
      - week: 5
        focus: "The ReAct loop — interleaving reasoning traces and actions. Observation → Thought → Action → Observation cycle. How the loop handles tool errors, decides when to stop, and avoids infinite loops. The augmented-LLM mental model."
        readings:
          - type: paper
            title: "ReAct (Yao et al.)"
            locator: "full"
            cost: free
          - type: reference
            title: "Lilian Weng: LLM Agents"
            locator: "planning + tool-use sections"
            cost: free
        deliverable: "Diagram the ReAct loop for a specific task (e.g., research a question). Annotate each transition: what the model sees, what it decides, what action it takes. Identify 2 ways this loop can fail and how to guard against them."
      - week: 6
        focus: "Reflection and planning — self-critique loops (Reflexion), plan-and-execute vs ReAct, when each pattern wins. The agent-computer interface (ACI) concept: designing interfaces for agents, not humans. Workflows vs agents — Anthropic's framing."
        readings:
          - type: paper
            title: "Reflexion"
            locator: "full"
            cost: free
          - type: reference
            title: "SWE-agent (ACI)"
            locator: "sec. 1–3"
            cost: free
          - type: reference
            title: "Anthropic: Building Effective Agents"
            locator: "full"
            cost: free
        deliverable: "Critique a production agent loop (SWE-agent or Anthropic Research). Identify the control-flow shape, how it handles tool errors, how it decides when to stop, and at least 2 failure modes with concrete examples from the architecture. Use your coding agent to study the source; your output is the analysis."
    outcomes:
      - id: u3.loop
        statement: "Analyze agent loop architectures (ReAct, Plan+Execute, Reflection) from primary sources. Identify the control-flow shape, error-recovery strategy, stopping condition, and specific failure modes — using a coding agent to study implementations, you provide the architectural critique."
        bloom_level: analyze
        depends_on: [u2.prompt]
        proof: a.u3.loop
        spaced_items: [pat.react-loop, pat.reflection, con.aci, con.workflows-vs-agents]
        mastery_threshold: 0.8

