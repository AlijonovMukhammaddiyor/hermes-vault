  - id: u6-agent-loops
    title: Agent Loops — ReAct, Reflection & Planning
    order_index: 6
    semester: 1
    est_weeks: 2
    foundational: false
    summary: "Build the core agent loop. Implement ReAct (Reason+Act) from scratch, then layer on reflection (self-critique + improvement) and planning (decompose → execute → verify). Study the SWE-agent ACI insight."
    resources:
      - type: course
        title: "DeepLearning.AI: Agentic AI (Andrew Ng)"
        url: "https://www.deeplearning.ai/short-courses/agentic-ai/"
        locator: "full course (4 design patterns: reflection, tool use, planning, multi-agent)"
        why: "Practical treatment of the four patterns with heavy eval emphasis — the canonical practitioner course."
        tier: core
        cost: free
      - type: paper
        title: "SWE-agent: Agent-Computer Interfaces Enable Automated Software Engineering"
        author: "Yang, Jimenez, Wettig, Lieret, Yao, Narasimhan, Press (NeurIPS 2024)"
        url: "https://arxiv.org/abs/2405.15793"
        locator: "full paper — focus on ACI design (sec. 3)"
        why: "The ACI insight: LM agents need purpose-built interfaces. The most-imitated idea in coding agents."
        tier: core
        cost: free
      - type: course
        title: "Hugging Face Agents Course — Unit 2: Agentic Patterns"
        url: "https://huggingface.co/learn/agents-course/unit2"
        locator: "full unit"
        why: "Hands-on: tool use → planning → reflection patterns with smolagents."
        tier: supplementary
        cost: free
    sessions:
      - week: 10
        focus: "The ReAct loop — interleaving reasoning traces and actions. Observation → Thought → Action → Observation cycle. Implementing the loop from scratch (~200 lines)."
        readings:
          - type: course
            title: "DeepLearning.AI Agentic AI"
            locator: "tool use + planning patterns"
            cost: free
          - type: paper
            title: "SWE-agent"
            locator: "sec. 1-3 (intro, ACI design)"
            cost: free
        deliverable: "Implement a ReAct agent loop from scratch — reason → act → observe → reason — with 2+ tools. Must handle: when to stop, what to do on tool error, how to avoid loops."
      - week: 11
        focus: "Reflection and planning — self-critique loops (Reflexion), plan-and-execute vs ReAct, when each pattern wins. The ACI concept: designing interfaces for agents, not humans."
        readings:
          - type: course
            title: "DeepLearning.AI Agentic AI"
            locator: "reflection pattern + full review"
            cost: free
          - type: course
            title: "Hugging Face Agents Course — Unit 2"
            locator: "planning + reflection sections"
            cost: free
        deliverable: "Extend your ReAct agent with a reflection step — after producing an answer, critique it, then improve. Compare ReAct vs Plan+Execute on 5 tasks. Write: when does reflection actually help?"
    outcomes:
      - id: u6.build-agent
        statement: "Build a working ReAct agent from scratch (~400 lines, no framework) with ≥3 real tools, reflection capability, and ≥10 eval cases. Explain the loop architecture and the ACI design principle."
        bloom_level: create
        depends_on: [u5.tools]
        proof: a.u6.build
        spaced_items: [pat.react-loop, pat.reflection, pat.aci]
        mastery_threshold: 0.8

  - id: u7-context-engineering
    title: Context Engineering & Memory
    order_index: 7
    semester: 1
    est_weeks: 1
    foundational: false
    summary: "Master the discipline that separates production agents from demos: KV-cache economics, context compaction, externalized memory (file system as context), and preserving failure traces."
    resources:
      - type: reference
        title: "Manus: Context Engineering for AI Agents — Lessons from Building Manus"
        author: "Yichao 'Peak' Ji"
        url: "https://manus.im/blog/context-engineering"
        locator: "full article (six principles)"
        why: "The six principles from a production agent at scale (~50 tool calls/task avg). KV-cache hit rate as the single most important metric."
        tier: core
        cost: free
      - type: docs
        title: "Anthropic: Effective Context Engineering for AI Agents"
        url: "https://docs.anthropic.com/en/docs/build-with-claude/context-window"
        locator: "full guide"
        why: "The complementary practitioner treatment from the other major lab."
        tier: core
        cost: free
      - type: paper
        title: "LLMs Get Lost in Multi-Turn Conversation"
        author: "Laban, Hayashi et al."
        url: "https://arxiv.org/abs/2505.06120"
        locator: "abstract + results (sec. 3-4)"
        why: "Quantified context rot: 39% drop single-turn → multi-turn across 15 models. The empirical case for context engineering."
        tier: supplementary
        cost: free
    sessions:
      - week: 12
        focus: "KV-cache economics — prompt prefix stability, append-only context, cached vs uncached cost (10× difference). File system as externalized memory. Masking tool logits. Keeping wrong turns in. Attention through recitation."
        readings:
          - type: reference
            title: "Manus: Context Engineering"
            locator: "full (all six principles)"
            cost: free
          - type: docs
            title: "Anthropic: Effective Context Engineering"
            locator: "full"
            cost: free
        deliverable: "Take your ReAct agent from U6 and instrument it: track token usage per turn, KV-cache hit rate, and context length. Implement 2 context-engineering techniques (e.g., append-only context, file-system offloading of long tool outputs). Measure the improvement. Due: end of Semester 1."
    outcomes:
      - id: u7.context
        statement: "Instrument an agent with context-efficiency metrics and implement at least 2 context-engineering techniques with a measured before/after improvement report."
        bloom_level: evaluate
        depends_on: [u6.build-agent]
        proof: a.u7.context
        spaced_items: [con.kv-cache, con.context-engineering]
        mastery_threshold: 0.8

