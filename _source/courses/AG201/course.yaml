id: AG201
title: AI Agent Engineering
subject_domain: ai-engineering
credits: 4
north_star: >
  Design, evaluate, and deploy production-grade AI agent systems — from a single ReAct loop
  to multi-agent orchestrations — with the architectural judgment of a staff-level engineer
  who steers coding agents, not types every line.
description: >
  Concept-first, eval-forward: a 22-week course that builds architectural judgment for the
  AI coding agents era. The learner already has a coding agent — this course teaches what to
  build, why, and how to evaluate it. Anchored in Chip Huyen's AI Engineering, Anthropic's
  engineering essays, and the Berkeley LLM Agents MOOC. Every unit teaches the mental model
  first, then asks the learner to critique, design, or evaluate — leaving implementation to
  their agent. Threads eval literacy from week 7 onward, with a dedicated observability
  deep-dive before the capstone. Graduates can defend an architecture decision record with
  quantitative reasoning about cost, latency, reliability, and when NOT to add complexity.

audience:
  good_fit:
    - "You have a coding agent and know enough Python to read, review, and steer it. You want to develop architectural judgment — what to build, why, and how to evaluate it — without spending months on implementation drills."
    - "You have 2–3h/day and want to reach staff-level reasoning about agent systems: design tradeoffs, eval methodology, context engineering, and production reliability."
  not_a_fit:
    - "Already shipping production agent systems at scale and reading COLM papers weekly — go straight to the Berkeley Advanced LLM Agents MOOC and read Anthropic's engineering blog directly."
    - "Looking for step-by-step coding tutorials or framework-wiring guides — this course is about architectural reasoning, not typing. You'll use your coding agent for implementations."
    - "No ability to read and reason about Python code at all — get comfortable with reading agent code (your coding agent can explain it) first, then come back."
prerequisites: []
enduring_understandings:
  - "Evaluation is the engine of improvement — not a final step. The #1 differentiator between competent and excellent agent engineers is disciplined eval and error analysis. Per Yao: the second half of AI shifts focus from solving problems to defining them."
  - "Context engineering — KV-cache economics, compaction, externalized memory, preserving failures — is where reliability is won or lost, not prompt polishing."
  - "Architecture follows task structure. Multi-agent wins for parallelizable, independent subtasks (but costs 15× tokens). Single-agent or deterministic pipelines win for tightly coupled work. Know when NOT to add agentic complexity."
  - "The Bitter Lesson applies at the application layer: scaffolding that models can internalize will be obsolete. Build harnesses that survive model upgrades. The willingness to strip scaffolding is the staff-level muscle."
  - "Compound errors in agentic systems mean minor issues can derail entire runs (95% per-step → ~60% over 10 steps). Observability, checkpointing, and graceful error recovery are not optional — they are the system."
  - "In the coding-agents era, the engineer's job shifts from writing code to defining problems, designing architectures, writing eval specs, and reviewing agent output. Code literacy is required; typing speed is not."

primary_text:
  type: textbook
  title: "AI Engineering: Building Applications with Foundation Models"
  author: "Chip Huyen"
  url: "https://www.oreilly.com/library/view/ai-engineering/9781098166309/"
  locator: "whole — ch. 4 (eval), ch. 5 (prompting), ch. 6 (RAG & agents), ch. 9–10 (architecture & deployment). Local copy: Uploads/AG201/AI Engineering by Chip Huyen.md"
  why: "The single best prose-based textbook for this learner — concept-first, no code required, with the eval rigor and production architecture judgment that separates senior engineers. Read cover-to-cover. Full markdown in vault."
  tier: core
  cost: paid

