professor_profile:
  persona: >
    A senior agent engineer who has designed and shipped production agent systems. Direct, no fluff,
    allergic to framework-worship. Speaks in architecture diagrams and eval metrics, not hype.
    Pushes the learner to understand WHY before reaching for WHAT — reads production write-ups,
    studies failure modes, measures everything. Deeply respects the craft of building reliable
    systems on unreliable foundations. In this era, knows the difference between work a coding
    agent should do and work that requires human architectural judgment.
  teaching_stance: >
    Concept-first, critique-second, evaluate-third. Every new idea starts with the mental model
    (diagram + primary source), then asks the learner to critique existing implementations or
    design their own — using their coding agent for the build work. The learner's job is
    architectural reasoning, eval design, and output review; the agent handles implementation.
    Faded scaffolding: heavily guided on foundations, increasingly independent as the learner
    builds judgment. Wrong answers get targeted micro-lessons on the exact misconception, then
    re-testing. Every unit connects back to a real production system (Anthropic, Manus, Fin).
  common_misconceptions:
    - "Agents are just LLMs with tools wired in — the real complexity is context management, error recovery, and eval, not the wiring."
    - "Multi-agent is always better — single-agent beats multi-agent for tightly coupled work, and multi-agent's cost (15× tokens) must be justified by the task structure."
    - "You need LangChain/CrewAI to build agents — the best engineers understand the architecture first; frameworks earn their place later."
    - "Eval can wait until the end — eval is the engine of improvement and must be built alongside the agent from day one."
    - "More context = better agent — KV-cache hit rate is the single most important metric for production agent cost and latency; compaction beats expansion."
    - "In the coding-agents era, you don't need to understand code — you must read, review, and reason about code fluently; you just don't need to type every line."
  assessment_philosophy: >
    Excellent means the learner can (a) explain every architectural decision with quantitative
    reasoning (cost, latency, reliability), (b) design and critique evals that catch real failure
    modes, (c) read and analyze a production agent system's architecture from primary sources,
    and (d) produce an architecture decision record that a staff engineer would defend in review.
    The learner uses their coding agent for implementation — the assessment measures architectural
    judgment, eval design, and output review, not typing speed. Rubric grading: every artifact is
    scored against specific criteria with written reasoning before each verdict. Above Bloom
    "apply," a self-explanation is required. Mediocre work gets honest feedback, not a passing
    grade — the bar is what a staff engineer would ship and defend.

mastery_model:
  excellence_bar: >
    A staff-level agent engineer can: (1) decompose an ambiguous problem into the right control-flow
    shape (prompt chaining, routing, parallelization, orchestrator-workers, evaluator-optimizer);
    (2) design evaluation and observability infrastructure that makes iteration possible; (3) reason
    quantitatively about cost, latency, and reliability trade-offs; (4) design agent harnesses that
    survive model upgrades; (5) know when NOT to add agentic complexity; (6) read and critique a
    frontier agent architecture from primary sources; (7) define the problem and eval spec, then
    delegate implementation to a coding agent while reviewing output rigorously.
  expert_practices:
    - "Define the eval spec before building anything — held-out test set, LLM-as-judge rubric, error categories. Then delegate the build, review the output, and iterate based on error analysis."
    - "Track total runtime per tool call, total tool calls, total token consumption, tool error rates, KV-cache hit rate, and trajectory quality — not just top-line accuracy."
    - "End-state evaluation for stateful agents, not turn-by-turn. LLM-as-judge for scalable scoring plus mandatory human review to catch edge cases."
    - "Keep architecture simple. Make reasoning visible. Ensure reliable, well-scoped tool interactions. Use checkpointing, retry logic, and incremental deployments."
    - "Design harnesses expecting to re-architect repeatedly as models improve. The willingness to strip away scaffolding when models internalize it is the staff-level muscle."
    - "Read one frontier paper per week, one production post-mortem per week. The field moves fast — architectural judgment comes from seeing what breaks at scale, not from tutorials."
  frontier: >
    The central live debate (2025–2026): single-agent (Cognition) vs. multi-agent (Anthropic).
    Anthropic's multi-agent system outperforms single-agent by 90.2% on internal evals but uses
    15× more tokens. Code-execution agents (CodeAct) increasingly outperform JSON tool-calling.
    MCP has become the de-facto standard for agent-tool integration, adopted across the industry.
    SWE-bench Verified is approaching saturation (Claude Opus 4.5 at 79.2%) — the field is moving
    to harder benchmarks (SWE-bench Pro, Terminal-Bench). Agentic RL (AgentGym-RL, RAGEN) is the
    next frontier — training agents, not just prompting them. Shunyu Yao's "The Second Half" frames
    the era: evaluation over training, problem definition over problem solving.
  staying_current:
    - type: reference
      title: "Latent Space (swyx & Alessio)"
      url: "https://latentspacepod.com"
      why: "The AI-engineering publication of record — newsletter, podcast, weekly LLM Paper Club on Discord."
    - type: reference
      title: "Simon Willison's Weblog"
      url: "https://simonwillison.net"
      why: "Near-daily practical AI engineering — the 'lethal trifecta' framing for agent security."
    - type: reference
      title: "Interconnects (Nathan Lambert)"
      url: "https://interconnects.ai"
      why: "RLHF and post-training deep analysis — the training side of agent capability."
    - type: reference
      title: "Lilian Weng's Blog"
      url: "https://lilianweng.github.io"
      why: "Agents, reasoning, self-improvement — from the author of the canonical agent primer."
    - type: reference
      title: "Anthropic Engineering Blog"
      url: "https://anthropic.com/engineering"
      why: "Primary source for production agent architecture, eval methodology, and tool design."
    - type: reference
      title: "COLM (Conference on Language Modeling)"
      url: "https://colmweb.org"
      why: "The LLM-focused academic venue — where the best agent architecture papers are published."
    - type: reference
      title: "LLM Agents MOOC Community"
      url: "https://llmagents-learning.org/"
      why: "Berkeley course site with lecture videos, paper lists, and community discussion."
  signature_work: >
    An architecture decision record (ADR) for a production-grade agent system — designed, not just
    built. The ADR covers: problem decomposition into the right control-flow shape, tool selection
    and MCP integration strategy, context-engineering approach (with quantitative KV-cache
    reasoning), eval harness design (held-out sets, LLM-as-judge, error categories), observability
    plan (Langfuse tracing, key metrics, alert thresholds), and cost/latency/reliability tradeoffs
    defended quantitatively. The learner delegates implementation to their coding agent but reviews
    every output against the ADR. This is what earns a seat with the best — not a certificate,
    but demonstrable architectural judgment.
  deliberate_practice: >
    Each unit: concept lesson (diagram + primary source) → critique an existing architecture or
    design an eval → delegate implementation to coding agent → review output against rubric →
    error analysis → re-design. Weekly: read one frontier paper or production post-mortem and write
    a one-paragraph critique. Monthly: deep-dive one production system's architecture (OpenHands,
    Anthropic Research, Manus). The rhythm is understand → critique → design → evaluate, every week.
    The learner's coding agent handles the typing; the learner's brain handles the judgment.

grading_scale: { A: 4.0, B: 3.0, C: 2.0, F: 0.0 }
grade_weights: { hw: 0.40, quiz: 0.15, exam: 0.15, midterm: 0.10, finals: 0.20 }

rubrics:
  - id: architecture-critique
    shape: analytic
    criteria:
      - name: "Architectural reasoning"
        target_descriptor: "Identifies the control-flow shape, explains why it fits (or doesn't) the task structure, and cites specific evidence from the source."
      - name: "Quantitative analysis"
        target_descriptor: "Reasons about cost, latency, and reliability with specific numbers (token counts, step counts, error rates) — not just qualitative hand-waving."
      - name: "Failure-mode identification"
        target_descriptor: "Identifies at least 2 specific failure modes (compounding error, context rot, tool hallucination, game-of-telephone) with concrete examples from the architecture."
      - name: "Self-explanation"
        target_descriptor: "Can defend every judgment with reasoning rooted in the primary source or the course's enduring understandings. Required for Bloom ≥ apply."
  - id: eval-design
    shape: analytic
    criteria:
      - name: "Eval spec completeness"
        target_descriptor: "Held-out test set defined (≥10 cases), LLM-as-judge rubric specified, error categories enumerated, success thresholds set with justification."
      - name: "Error analysis depth"
        target_descriptor: "Identifies the weakest component from eval results, traces failures to root causes (not symptoms), proposes a specific improvement."
      - name: "Metric selection"
        target_descriptor: "Chooses metrics beyond accuracy — includes trajectory quality, tool-call accuracy, token efficiency, or latency where relevant — with reasoning for each."
  - id: adr-rubric
    shape: analytic
    criteria:
      - name: "Problem decomposition"
        target_descriptor: "Decomposes an ambiguous goal into the right control-flow shape with clear rationale — why this pattern, not the alternatives."
      - name: "Architecture decisions"
        target_descriptor: "Each major decision (tool design, context strategy, orchestration pattern, eval approach) is justified with quantitative reasoning or research citations."
      - name: "Tradeoff analysis"
        target_descriptor: "Explicitly compares alternatives (single vs multi-agent, RAG vs long context, JSON tools vs CodeAct) with cost/latency/reliability reasoning."
      - name: "Observability plan"
        target_descriptor: "Specifies what to trace, which metrics matter, alert thresholds, and how to diagnose failures from traces."
      - name: "Self-explanation"
        target_descriptor: "Can defend the entire ADR orally — every choice traced back to a principle, a paper, or a production case study. Required."

assessments:
  # U1 – LLM Foundations
  - id: a.u1.transformer
    outcome_id: u1.transformer
    type: summative
    modality: explain
    bloom_target: understand
    rubric_id: architecture-critique
    proof_gate: "Explain the transformer architecture from first principles — attention, Q/K/V, multi-head, layer norm, residual connections, positional encoding. Diagram the inference forward pass. Explain why decoder-only dominates modern LLMs. No implementation required — conceptual fluency only."
    scaffold_stage: completion

  # U2 – Prompt Engineering
  - id: a.u2.prompt
    outcome_id: u2.prompt
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: eval-design
    proof_gate: "Design 5 prompts for the same task with escalating quality (naive → system message → few-shot → CoT → structured output). Use your coding agent to run each against a 10-example test set. Score each, identify which technique improved which failure mode, and explain why. The agent runs the prompts; you design them and analyze the results."
    scaffold_stage: completion

  # U3 – Agent Loops
  - id: a.u3.loop
    outcome_id: u3.loop
    type: summative
    modality: explain
    bloom_target: analyze
    rubric_id: architecture-critique
    proof_gate: "Critique a production agent loop (Anthropic Research, SWE-agent, or OpenHands). Identify: (a) the control-flow shape (ReAct, Plan+Execute, routing), (b) how it handles tool errors, (c) how it decides when to stop, (d) at least 2 failure modes with concrete examples from the architecture. Cite specific sections of the source. Use your coding agent to study the codebase — your output is the architectural analysis, not the code."
    scaffold_stage: completion

  # U4 – Eval Foundations
  - id: a.u4.eval
    outcome_id: u4.eval
    type: summative
    modality: open_problem
    bloom_target: apply
    rubric_id: eval-design
    proof_gate: "Design an eval spec for an agent system (your choice or assigned). Include: ≥10 held-out test cases, an LLM-as-judge rubric with explicit scoring criteria, error categories, success thresholds, and a plan for human review of edge cases. No implementation required — this is the spec that would guide a build. Must show understanding of end-state vs turn-by-turn, trajectory quality, and why pass/fail accuracy alone is insufficient."
    scaffold_stage: completion

  # U5 – Tool Use & MCP
  - id: a.u5.tools
    outcome_id: u5.tools
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: architecture-critique
    proof_gate: "Design the tool interface for an agent system. Specify: ≥3 tools with MCP-compatible schemas, parameter design with clear descriptions, error-recovery strategy (retry/fallback/escalate) for each tool, and the tool-selection logic. Then analyze an existing tool interface (OpenAI function calling or Anthropic tool use) — identify 2 design weaknesses and propose improvements. Use your coding agent to build the schema; you provide the design reasoning and critique."
    scaffold_stage: independent

  # U6 – Context Engineering
  - id: a.u6.context
    outcome_id: u6.context
    type: summative
    modality: explain
    bloom_target: evaluate
    rubric_id: architecture-critique
    proof_gate: "Analyze the context-engineering strategy of a production agent (Manus or Anthropic Research). Identify: (a) which of the Manus six principles are applied, (b) the KV-cache economics (what's cached, what's not, and why), (c) context compaction strategy, (d) what's offloaded to external memory vs kept in-context. Propose one concrete improvement with quantitative reasoning. Use your coding agent to study the source material; your output is the analysis."
    scaffold_stage: independent

  # U7 – RAG
  - id: a.u7.rag
    outcome_id: u7.rag
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: architecture-critique
    proof_gate: "Design a RAG pipeline as an agent tool. Specify: embedding model, chunking strategy, vector store, retrieval approach (dense, sparse, hybrid), reranking, and when the agent should retrieve vs answer from context. Compare against the alternative (just stuffing context if it fits) — when does retrieval actually beat long context? Use your coding agent to prototype; you provide the design rationale and comparison analysis."
    scaffold_stage: independent

  # U8 – Multi-Agent
  - id: a.u8.multiagent
    outcome_id: u8.multiagent
    type: summative
    modality: explain
    bloom_target: evaluate
    rubric_id: architecture-critique
    proof_gate: "Read both sides of the debate: Anthropic's multi-agent research system and Cognition's 'Don't Build Multi-Agents.' For a given problem (assigned), argue which approach is correct with quantitative reasoning about cost (tokens), latency (parallel vs sequential), and reliability (compounding error, game-of-telephone). Design the coordination pattern if multi-agent is justified; explain why single-agent suffices if not. Cite specific evidence from both sources."
    scaffold_stage: independent

  # U9 – Code & Computer-Use Agents
  - id: a.u9.code-agent
    outcome_id: u9.code-agent
    type: summative
    modality: explain
    bloom_target: analyze
    rubric_id: architecture-critique
    proof_gate: "Architectural analysis of a production code-execution agent (OpenHands or SWE-agent). Cover: (a) the CodeAct paradigm vs JSON tool-calling — why code as action space, (b) sandbox design and security boundaries, (c) the event-stream or agent-computer interface architecture, (d) how it handles execution errors and iterates. Identify 3 specific design decisions and why they matter. Use your coding agent to study the source; your output is the analysis, not the code."
    scaffold_stage: independent

  # U10 – Safety & Guardrails
  - id: a.u10.safety
    outcome_id: u10.safety
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: architecture-critique
    proof_gate: "Design a safety and guardrail architecture for an agent that handles user data. Address: (a) input guardrails (prompt injection, PII detection), (b) output guardrails (content safety, hallucination detection), (c) escalation-to-human thresholds, (d) blast-radius engineering (least-privilege sandboxing). Map your design to the OWASP LLM Top 10. For each guardrail, specify what happens on violation. Use your coding agent to research implementations; you design the architecture."
    scaffold_stage: independent

  # U11 – Production Deployment
  - id: a.u11.deploy
    outcome_id: u11.deploy
    type: summative
    modality: explain
    bloom_target: evaluate
    rubric_id: architecture-critique
    proof_gate: "Analyze a production agent deployment (Fin by Intercom or Anthropic Research). Cover: (a) checkpointing and retry strategy, (b) cost monitoring and optimization (token budgets, model selection), (c) rainbow/incremental deployment pattern, (d) reliability architecture (what happens when a component fails). Then address: when does post-training/RL beat context engineering for reliability? Argue both sides using the Manus deliberate-no-fine-tuning position as one reference. Use your coding agent to gather data; you produce the analysis."
    scaffold_stage: independent

  # U12 – Observability & Trajectory Evals
  - id: a.u12.observe
    outcome_id: u12.observe
    type: summative
    modality: open_problem
    bloom_target: evaluate
    rubric_id: eval-design
    proof_gate: "Instrument an existing agent (yours or a studied system) with a full observability plan. Specify: tracing tool (Langfuse or LangSmith), key metrics (token usage, tool-call count, latency, error rates, KV-cache hit rate), alert thresholds, and a dashboard layout. Run ≥10 tasks, capture traces, and produce an error analysis identifying the single weakest component. Propose a fix, implement it (via coding agent), and show before/after metrics. This is a measured improvement report — not just a plan."
    scaffold_stage: independent

  # U13 – Capstone
  - id: a.u13.capstone
    outcome_id: u13.capstone
    type: summative
    modality: project
    bloom_target: create
    rubric_id: adr-rubric
    proof_gate: "Architecture Decision Record for a production-grade agent system. Must cover: problem decomposition into the right control-flow shape, tool design with MCP integration, context-engineering strategy with quantitative KV-cache reasoning, eval harness design, observability plan, and cost/latency/reliability tradeoffs defended quantitatively. Every major decision must cite a principle, a paper, or a production case study. The learner delegates implementation to their coding agent but reviews every output against the ADR. Oral defense: explain any choice on the spot."
    scaffold_stage: independent

units:
  # ═══════════════ U1: LLM Foundations ═══════════════
  - id: u1-llm-foundations
    title: LLM Foundations — What You Need to Reason About
    order_index: 1
    semester: 1
    est_weeks: 2
    foundational: true
    summary: "Build conceptual fluency in the transformer architecture and LLM inference — the substrate agents run on. No from-scratch implementation; the goal is to reason about attention, context windows, tokenization, and why these matter for agent design. Framed by Shunyu Yao's 'The Second Half': the era has shifted from training to evaluation, from solving to defining."
    resources:
      - type: video
        title: "3Blue1Brown: Transformers & Attention"
        url: "https://www.youtube.com/watch?v=eMlx5fFNoYc"
        locator: "full series"
        why: "The visual intuition for attention, Q/K/V, and multi-head — the 'aha' moment before diving into details."
        tier: core
        cost: free
      - type: video
        title: "Andrej Karpathy: Deep Dive into LLMs like ChatGPT"
        url: "https://www.youtube.com/watch?v=7xTGNNLPyMI"
        locator: "full video (~3.5h)"
        why: "The fastest path to a strong mental model of how LLMs work — tokenization, pretraining, fine-tuning, RLHF, tool use, multimodal."
        tier: core
        cost: free
      - type: reference
        title: "\"The Second Half\" (Shunyu Yao)"
        url: "https://ysymyth.github.io/The-Second-Half/"
        locator: "full essay"
        why: "Sets the philosophical spine: evaluation over training. Read first — it frames why this course is eval-forward."
        tier: core
        cost: free
      - type: textbook
        title: "AI Engineering (Huyen)"
        locator: "ch. 1–3 (foundation models overview)"
        why: "The engineering perspective: what matters for building on top of models, not training them."
        tier: core
        cost: paid
    sessions:
      - week: 1
        focus: "The mental model — tokenization, embeddings, attention (Q/K/V), multi-head attention, causal masking. What the model 'sees' vs what you send. Why context windows matter. Start with Yao's 'The Second Half' — why this course is eval-forward."
        readings:
          - type: reference
            title: "\"The Second Half\" (Yao)"
            locator: "full"
            cost: free
          - type: video
            title: "3Blue1Brown: Transformers & Attention"
            locator: "full series"
            cost: free
          - type: textbook
            title: "AI Engineering (Huyen)"
            locator: "ch. 1–2"
            cost: paid
        deliverable: "Explain, from memory: how attention works (Q, K, V, softmax), why multi-head, and what happens during a single inference forward pass. No code — a diagram and a paragraph."
      - week: 2
        focus: "Full transformer architecture — layer norm, residual connections, FFN, positional encoding, decoder-only vs encoder-decoder. Pretraining vs fine-tuning vs in-context learning. Why decoder-only dominates modern LLMs. Karpathy's deep dive."
        readings:
          - type: video
            title: "Karpathy: Deep Dive into LLMs"
            locator: "full"
            cost: free
          - type: textbook
            title: "AI Engineering (Huyen)"
            locator: "ch. 3"
            cost: paid
        deliverable: "Explain: why decoder-only for modern LLMs? What is the Bitter Lesson and why does it matter for agent engineering? How does the context window constrain agent design? Use your coding agent to look up specific numbers — your output is the reasoning."
    outcomes:
      - id: u1.transformer
        statement: "Explain the transformer architecture from first principles (attention, Q/K/V, multi-head, layer norm, positional encoding) and the inference forward pass. Connect architectural properties (context window, decoder-only design, Bitter Lesson) to agent design constraints — all at the conceptual level, no implementation required."
        bloom_level: understand
        depends_on: []
        proof: a.u1.transformer
        spaced_items: [con.attention, con.transformer, con.bitter-lesson]
        mastery_threshold: 0.8

  # ═══════════════ U2: Prompt Engineering & Structured Output ═══════════════
  - id: u2-prompt-engineering
    title: Prompt Engineering & Structured Output — Programming in Natural Language
    order_index: 2
