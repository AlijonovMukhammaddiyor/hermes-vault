  # ═══════════════ U5: Tool Use & MCP ═══════════════
  - id: u5-tool-use-mcp
    title: Tool Use & MCP — Connecting Agents to the World
    order_index: 5
    semester: 1
    est_weeks: 2
    foundational: false
    summary: "Design tool interfaces that agents can use reliably. Study tool-calling APIs (OpenAI, Anthropic), the ReAct and Toolformer papers, and the Model Context Protocol (MCP) — the de-facto standard for agent-tool integration. The goal: design tool schemas and MCP servers, analyze existing tool interfaces for weaknesses, and reason about error recovery."
    resources:
      - type: docs
        title: "Anthropic Tool Use Guide"
        url: "https://docs.anthropic.com/en/docs/build-with-claude/tool-use"
        locator: "full guide (overview → defining tools → tool use workflow → best practices)"
        why: "The primary reference for tool-design principles — written by the team defining the field."
        tier: core
        cost: free
      - type: docs
        title: "OpenAI Function Calling Guide"
        url: "https://platform.openai.com/docs/guides/function-calling"
        locator: "full guide"
        why: "The other major API contract — understand both paradigms."
        tier: core
        cost: free
      - type: paper
        title: "Toolformer: Language Models Can Teach Themselves to Use Tools"
        author: "Schick et al."
        url: "https://arxiv.org/abs/2302.04761"
        locator: "full paper"
        why: "The foundational paper on tool use — how models learn to call APIs."
        tier: core
        cost: free
      - type: docs
        title: "Model Context Protocol (MCP) Specification"
        url: "https://modelcontextprotocol.io"
        locator: "specification + quickstart"
        why: "The de-facto standard for agent-tool integration — JSON-RPC, Resources/Tools/Prompts primitives. Required knowledge."
        tier: core
        cost: free
      - type: paper
        title: "ReAct (Yao et al.)"
        url: "https://arxiv.org/abs/2210.03629"
        locator: "tool-use sections (re-read with fresh eyes)"
        why: "Re-read the tool-use sections now that you understand the loop — see how tool design shapes loop behavior."
        tier: core
        cost: free
    sessions:
      - week: 8
        focus: "Tool design principles — schemas, parameter design, clear descriptions, idempotency. Single-tool vs multi-tool agents. Tool selection: how the model decides which tool to call. The Toolformer insight: models can learn to use tools from examples."
        readings:
          - type: docs
            title: "Anthropic Tool Use Guide"
            locator: "overview → defining tools → tool use workflow"
            cost: free
          - type: paper
            title: "Toolformer"
            locator: "full"
            cost: free
        deliverable: "Design 3 tool schemas for an agent (e.g., search, calculator, database query). For each: describe the tool, specify parameters with types, write the description the model sees, and define error responses. Then analyze: which tool would an LLM most likely misuse, and why? How would you redesign it?"
      - week: 9
        focus: "MCP deep-dive — the JSON-RPC protocol, Resources vs Tools vs Prompts primitives, client-server architecture. How MCP solves the M×N integration problem. Error recovery patterns: retry with backoff, fallback to alternative tool, escalate to human. Tool-result management."
        readings:
          - type: docs
            title: "MCP Specification"
            locator: "full"
            cost: free
          - type: docs
            title: "OpenAI Function Calling Guide"
            locator: "full"
            cost: free
        deliverable: "Design the tool interface for an agent system: ≥3 tools with MCP-compatible schemas, parameter design, error-recovery strategy for each, and tool-selection logic. Then analyze an existing tool interface (OpenAI or Anthropic) — identify 2 design weaknesses and propose improvements. Use your coding agent to build the schemas; you provide the design reasoning and critique."
    outcomes:
      - id: u5.tools
        statement: "Design tool interfaces for agents using MCP-compatible schemas with clear error-recovery strategies. Analyze existing tool-calling interfaces for design weaknesses and propose improvements — using a coding agent for schema construction, you provide the architectural reasoning."
        bloom_level: evaluate
        depends_on: [u4.eval]
        proof: a.u5.tools
        spaced_items: [pat.tool-schema, con.mcp, pat.error-recovery, con.tool-selection]
        mastery_threshold: 0.8

  # ═══════════════ U6: Context Engineering & Memory ═══════════════
  - id: u6-context-engineering
    title: Context Engineering & Memory — Where Reliability Is Won
    order_index: 6
    semester: 1
    est_weeks: 2
    foundational: false
    summary: "Master the discipline that separates production agents from demos: KV-cache economics, context compaction, externalized memory (file system as context), and preserving failure traces. Now that you've seen what fills the context window (tool calls, observations, reasoning traces), learn how to manage it."
    resources:
      - type: reference
        title: "Manus: Context Engineering for AI Agents"
        author: "Yichao 'Peak' Ji"
        url: "https://manus.im/blog/context-engineering"
        locator: "full article (six principles)"
        why: "The six principles from a production agent at scale — KV-cache hit rate as the single most important metric."
        tier: core
        cost: free
      - type: docs
        title: "Anthropic: Effective Context Engineering for AI Agents"
        url: "https://docs.anthropic.com/en/docs/build-with-claude/context-window"
        locator: "full guide"
        why: "The complementary practitioner treatment from the other major lab."
        tier: core
        cost: free
      - type: paper
        title: "MemGPT: Towards LLMs as Operating Systems"
        author: "Packer et al."
        url: "https://arxiv.org/abs/2310.08560"
        locator: "full paper"
        why: "The OS-analogy paper: virtual context management, interrupt-driven memory — the conceptual foundation."
        tier: supplementary
        cost: free
      - type: reference
        title: "Anthropic: Effective Harnesses for Long-Running Agents"
        url: "https://www.anthropic.com/engineering/effective-harnesses"
        locator: "full essay"
        why: "How to build harnesses that support long-horizon agent runs — progress artifacts, checkpointing, initialization."
        tier: core
        cost: free
    sessions:
      - week: 10
        focus: "KV-cache economics — prompt prefix stability, append-only context, cached vs uncached cost (10× difference). The six Manus principles: stable prefixes, append-only, masking tool logits, keeping wrong turns, attention through recitation, file system as externalized memory."
        readings:
          - type: reference
            title: "Manus: Context Engineering"
            locator: "full"
            cost: free
          - type: docs
            title: "Anthropic: Effective Context Engineering"
            locator: "full"
            cost: free
        deliverable: "Given a 10-step agent trace, identify: where the KV-cache breaks, where context rot sets in, and where compaction could help. Propose 3 concrete context-engineering improvements. Estimate the token savings."
      - week: 11
        focus: "File system as externalized memory — what to offload, what to keep in-context. The artifact pattern: write to shared filesystem, pass references. Harnesses for long-running agents — initializer agent, progress artifacts, checkpointing. Compounding error in long trajectories (95% per-step → ~60% over 10 steps)."
        readings:
          - type: reference
            title: "Anthropic: Effective Harnesses"
            locator: "full"
            cost: free
          - type: paper
            title: "MemGPT"
            locator: "full"
            cost: free
        deliverable: "Analyze the context-engineering strategy of Manus or Anthropic Research. Identify which of the six principles are applied, the KV-cache economics, the compaction strategy, and what's offloaded to external memory. Propose one concrete improvement with quantitative reasoning."
    outcomes:
      - id: u6.context
        statement: "Analyze context-engineering strategies in production agents (Manus six principles, KV-cache economics, externalized memory). Propose data-backed improvements with quantitative reasoning about token savings and reliability impact."
        bloom_level: evaluate
        depends_on: [u5.tools]
        proof: a.u6.context
        spaced_items: [con.kv-cache, con.context-engineering, pat.artifact-pattern, con.compounding-error]
        mastery_threshold: 0.8

