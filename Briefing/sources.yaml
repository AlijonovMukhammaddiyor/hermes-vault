# ── Daily Tech Briefing — source list (RFC-010) ──────────────────────────────
# THIS FILE LIVES IN YOUR VAULT — edit it in Obsidian (or say `add source <url>` / `remove source <…>`
# to the bot). Changes auto-sync to the agent. The briefer tries `rss`/`api` first (reliable full text),
# else fetches `url` or web-searches the site. `paid: true` = titles/teasers only. `weight: high` =
# always scanned. RSS feeds below were verified working on 2026-07-08; a few sources have no public feed
# and fall back to fetch/search (noted).

categories:
  - name: "AI labs & research"
    sources:
      - { title: "Anthropic", url: "https://www.anthropic.com/news", weight: high }        # no RSS → fetch
      - { title: "OpenAI", url: "https://openai.com/news/", rss: "https://openai.com/news/rss.xml", weight: high }
      - { title: "Google DeepMind", url: "https://deepmind.google/blog/", rss: "https://deepmind.google/blog/feed", weight: high }
      - { title: "Google Research", url: "https://research.google/blog/", rss: "https://research.google/blog/rss" }
      - { title: "Meta AI", url: "https://ai.meta.com/blog/" }                               # no RSS → fetch
      - { title: "Hugging Face", url: "https://huggingface.co/blog", rss: "https://huggingface.co/blog/feed.xml" }
      - { title: "Mistral AI", url: "https://mistral.ai/news/" }                             # no RSS → fetch

  - name: "AI engineering & practitioners"
